name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install coverage tools on Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov

      - name: Configure project
        run: cmake -S . -B _build -DBUILD_TESTS=ON -DCOLLECT_COVERAGE=ON -DCMAKE_BUILD_TYPE=Debug

      - name: Build project
        run: cmake --build _build

      - name: Run tests
        run: ctest --test-dir _build --output-on-failure --verbose

      - name: Generate coverage report
        if: matrix.os == 'ubuntu-latest'
        run: |
          lcov --capture --directory _build --output-file coverage.info
          lcov --remove coverage.info '/usr/*' '*/third-party/*' '*/tests/*' --output-file coverage.info
          lcov --list coverage.info

      - name: Upload coverage to Coveralls
        if: matrix.os == 'ubuntu-latest'
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: coverage.info
